name: Container
on: push

jobs:
  node_docker:
    runs-on: ubuntu-latest
    services:
      app:
        # our nodejs app image on docker hub
        image: alialaa17/node-api
        ports:
          - 3001:3000
      mongo:
        image: mongo
        ports:
          - "27017:27017"
    steps:
      - name: Log node version
        run: |
          node -v
          cat /etc/os-release
